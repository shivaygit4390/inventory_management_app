<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Responsive inventory management application.">
  <meta name="theme-color" content="#5254D8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Inventory Management">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Inventory Management</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f7f7fc;
    }

    body {
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      box-sizing: border-box;
      padding: 24px;
      color: #17203d;
      background:
        radial-gradient(circle at 86% 4%, rgba(122, 90, 248, 0.16), transparent 34%),
        linear-gradient(180deg, #f1f0ff 0%, #f7f7fc 44%, #f7f7fc 100%);
      opacity: 1;
      transition: opacity 160ms ease-out;
    }

    #app-loading.is-complete {
      pointer-events: none;
      opacity: 0;
    }

    .loading-panel {
      display: flex;
      width: min(100%, 360px);
      box-sizing: border-box;
      flex-direction: column;
      align-items: center;
      padding: 32px 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #e7e8f2;
      border-radius: 28px;
      box-shadow: 0 18px 46px rgba(23, 32, 61, 0.10);
    }

    .loading-mark {
      display: grid;
      width: 68px;
      height: 68px;
      place-items: center;
      color: #ffffff;
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #5254d8, #7a5af8);
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(82, 84, 216, 0.28);
    }

    .loading-title {
      margin: 22px 0 6px;
      font-size: 21px;
      font-weight: 750;
      letter-spacing: -0.3px;
    }

    .loading-message {
      margin: 0;
      color: #626b86;
      font-size: 14px;
      line-height: 1.5;
    }

    .loading-progress {
      width: 100%;
      height: 4px;
      margin-top: 24px;
      overflow: hidden;
      background: #e8e8ff;
      border-radius: 999px;
    }

    .loading-progress::after {
      display: block;
      width: 42%;
      height: 100%;
      content: "";
      background: linear-gradient(90deg, #5254d8, #7a5af8);
      border-radius: inherit;
      animation: loading-slide 1.1s ease-in-out infinite;
    }

    @keyframes loading-slide {
      from { transform: translateX(-120%); }
      to { transform: translateX(340%); }
    }

    @media (prefers-reduced-motion: reduce) {
      #app-loading { transition: none; }
      .loading-progress::after { animation: none; }
    }
  </style>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('app-loading');
      if (!loading) return;

      loading.classList.add('is-complete');
      window.setTimeout(function () { loading.remove(); }, 180);
    }, { once: true });
  </script>
</head>
<body>
  <div id="app-loading" role="status" aria-live="polite">
    <div class="loading-panel">
      <div class="loading-mark" aria-hidden="true">I</div>
      <h1 class="loading-title">Inventory Management</h1>
      <p class="loading-message">Loading the application…</p>
      <div class="loading-progress" aria-hidden="true"></div>
    </div>
  </div>
  <noscript>This application requires JavaScript to run.</noscript>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
